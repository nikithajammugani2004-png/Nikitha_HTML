<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

    <div class="card">
        <button class="beginner-btn">Beginner</button>
        
        <img src="face.jpg" alt="User Profile" class="profile-img">
        
        <h2 class="name">Nikitha</h2>
        <p class="title"><strong>Engineering Student</strong></p>

        <div class="buttons">
            <button class="btn message">Message</button>
            <button class="btn follow">Follow</button>
        </div>

        <hr>

        <p class="skills"><strong>Skills</strong></p>
        <div class="tags">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JavaScript</span>
            <span class="tag">React</span>
            <span class="tag">Node.js</span>
        </div>
    </div>

</body>
</html>
